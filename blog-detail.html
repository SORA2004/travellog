<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 상세 - Travel Blogs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body>
	<script type="module" src="scripts/firebase.js"></script>
<script type="module" src="scripts/header.js"></script>

    <!-- 헤더 동일하게 유지 -->
    <header>
        <div class="header-container flex items-center justify-between p-4 bg-white shadow-md">
            <div class="logo">
                <a href="index.html"><img src="mainbanner.jpg" alt="Travellog Logo" class="h-10"></a>
            </div>
            <nav class="header-menu flex items-center gap-4">
                <a href="addblog.html" id="myTravelLogButton" class="text-blue-500 hover:underline">나의 여행로그쓰기</a>
                <a href="#" id="openLoginModal" class="text-blue-500 hover:underline">로그인</a>
                <div id="userProfile" class="flex items-center cursor-pointer" style="display: none;">
                    <img id="userPhoto" src="" alt="프로필 사진" class="w-8 h-8 rounded-full mr-2">
                    <span id="userName" class="text-gray-700"></span>
                </div>
                <div class="header-icons flex items-center gap-2">
                    <a href="#"><i class="fas fa-globe text-gray-600"></i></a>
                    <a href="#"><i class="fas fa-bars text-gray-600"></i></a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 블로그 상세 내용 -->
    <div class="flex justify-center py-10 px-4">
        <div class="max-w-3xl w-full">
            <h1 id="blogTitle" class="text-3xl font-bold mb-4"></h1>
            <div class="flex items-center mb-4">
                <img id="authorPhoto" src="" alt="Author Photo" class="w-10 h-10 rounded-full mr-3">
                <div>
                    <p id="authorName" class="text-lg font-semibold"></p>
                    <p id="createdAt" class="text-sm text-gray-500"></p>
                </div>
            </div>
            <div id="blogContent" class="prose max-w-none"></div>
            <div id="blogImages" class="mt-6 flex flex-wrap gap-4">
                <!-- 이미지가 여기에 표시됩니다 -->
            </div>
            <div class="mt-6">
                <p><strong>여행지:</strong> <span id="blogLocation"></span></p>
                <p><strong>여행 기간:</strong> <span id="blogStartDate"></span> ~ <span id="blogEndDate"></span></p>
                <p><strong>태그:</strong> <span id="blogTags"></span></p>
                <p><strong>카테고리:</strong> <span id="blogCategory"></span></p>
                <p><strong>좋아요:</strong> <span id="blogLikes"></span></p>
                <p><strong>특집:</strong> <span id="blogFeatured"></span></p>
            </div>
        </div>
    </div>

    <!-- 푸터 동일하게 유지 -->
    <footer>
        <div class="footer-container">
            <div class="footer-section">
                <h4>Travellog</h4>
                <p>나의 멋진 여행을 공유하고, 전 세계와 함께 여행하세요.</p>
            </div>
            <div class="footer-section">
                <h4>Links</h4>
                <ul>
                    <li><a href="#">홈</a></li>
                    <li><a href="#">서비스</a></li>
                    <li><a href="#">약관</a></li>
                    <li><a href="#">개인정보 보호정책</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Follow Us</h4>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2024 Travellog. All rights reserved.</p>
        </div>
    </footer>

    <!-- 추가적인 스타일 동일하게 유지 -->
    <style>
        /* ... 기존 스타일 ... */
    </style>

    <!-- 블로그 상세 스크립트 -->
<script type="module">
import { db } from './scripts/firebase.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js';

document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const blogId = urlParams.get('id');

    if (!blogId) {
        alert('블로그 ID가 없습니다.');
        window.location.href = 'index.html';
        return;
    }

        const blogDocRef = doc(db, 'blogs', blogId);
    const blogSnap = await getDoc(blogDocRef);

    if (blogSnap.exists()) {
        const data = blogSnap.data();

            document.getElementById('blogTitle').textContent = data.title || '제목 없음';
        document.getElementById('authorName').textContent = data.authorName || 'Unknown';
        document.getElementById('authorPhoto').src = data.authorPhotoURL || 'https://via.placeholder.com/150';
        document.getElementById('createdAt').textContent = data.createdAt ? data.createdAt.toDate().toLocaleString() : '날짜 정보 없음';
        document.getElementById('blogContent').innerHTML = data.content || '내용이 없습니다.';
        document.getElementById('blogLocation').textContent = data.location || '위치 정보 없음';
        document.getElementById('blogStartDate').textContent = data.startDate ? data.startDate.toDate().toLocaleDateString() : '날짜 정보 없음';
        document.getElementById('blogEndDate').textContent = data.endDate ? data.endDate.toDate().toLocaleDateString() : '날짜 정보 없음';
        document.getElementById('blogTags').textContent = data.tags && data.tags.length > 0 ? data.tags.join(', ') : '태그 없음';
        document.getElementById('blogCategory').textContent = data.category || '카테고리 없음';
        document.getElementById('blogLikes').textContent = data.likes || 0;
        document.getElementById('blogFeatured').textContent = data.featured ? '예' : '아니오';

        // 이미지 표시
        const imagesContainer = document.getElementById('blogImages');
        imagesContainer.innerHTML = '';
        if (data.images && data.images.length > 0) {
            data.images.forEach(url => {
                imagesContainer.innerHTML += `<img src="${url}" alt="Blog Image" class="w-48 h-32 object-cover rounded-lg">`;
            });
        }
    } else {
        alert('블로그를 찾을 수 없습니다.');
        window.location.href = 'index.html';
    }
});
</script>
